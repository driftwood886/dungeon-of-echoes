services:
  - type: web
    name: dungeon-of-echoes
    runtime: node
    plan: free
    region: oregon  # US West — más cercano a Sudamérica con free tier
    branch: main
    buildCommand: npm ci --omit=dev
    startCommand: node server/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        # Con disco persistente (plan starter+): usar /data/dungeon.sqlite
        # Sin disco (free): usar /tmp/dungeon.sqlite (se resetea en cada restart)
        value: /tmp/dungeon.sqlite
      - key: ADMIN_TOKEN
        generateValue: true  # Render genera un token aleatorio
    # ── DISCO PERSISTENTE ──────────────────────────────────────────────────────
    # Descomentar para usar disco persistente ($7/mes en plan Starter).
    # También cambiar DB_PATH a /data/dungeon.sqlite.
    # Sin esto, la BD SQLite se resetea en cada redeploy/restart del servidor.
    # disk:
    #   name: dungeon-data
    #   mountPath: /data
    #   sizeGB: 1
